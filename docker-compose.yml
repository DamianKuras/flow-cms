version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: flowcms_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-flowcms}
    ports:
      - "5432:5432"
    volumes:
      - flowcms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: flowcms_backend
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__Default=Host=db;Port=5432;Database=${POSTGRES_DB:-flowcms};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5043:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        - VITE_CMS_API_URL=${VITE_CMS_API_URL:-http://localhost:5043}
    container_name: flowcms_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  flowcms_postgres_data:
