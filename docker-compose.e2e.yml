services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: e2e_testdb
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d e2e_testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__Default=Host=db;Port=5432;Database=e2e_testdb;Username=testuser;Password=testpassword
      - Seed__AdminEmail=${E2E_ADMIN_EMAIL:-admin@admin.com}
      - Seed__AdminPassword=${E2E_ADMIN_PASSWORD:-Admin@123}
      - Seed__DevUserPassword=DevUser@123
      - Seed__DevUserCount=0
      - Cors__AllowedOrigins__0=http://localhost:5173
      - Cors__AllowedOrigins__1=http://frontend
    ports:
      - "5252:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        - VITE_CMS_API_URL=http://frontend/api
    ports:
      - "5173:80"
    depends_on:
      - backend

  tests:
    build:
      context: .
      dockerfile: tests/E2E.Tests/Dockerfile
    environment:
      - E2E_API_URL=http://backend:8080
      - E2E_FRONTEND_URL=http://frontend:80
      - E2E_DB_CONNECTION_STRING=Host=db;Port=5432;Database=e2e_testdb;Username=testuser;Password=testpassword
      - E2E_ADMIN_EMAIL=${E2E_ADMIN_EMAIL:-admin@admin.com}
      - E2E_ADMIN_PASSWORD=${E2E_ADMIN_PASSWORD:-Admin@123}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
      frontend:
        condition: service_started
    profiles:
      - tests
